<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>竹中炎上計時器｜新竹高中無情倒數</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1a1e2b 0%, #0f121c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Microsoft JhengHei', sans-serif;
            padding: 1.5rem;
        }
        .card {
            background: rgba(18, 22, 35, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2rem 1.8rem 2.2rem;
            max-width: 700px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s ease;
        }
        .badge {
            background: #2d2f42;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: #b9c3e9;
            margin-bottom: 1.4rem;
            border: 1px solid #404463;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF 0%, #b7c9ff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }
        .sub {
            color: #8f9bb5;
            margin-bottom: 2rem;
            font-size: 1rem;
            border-left: 3px solid #ff6b6b;
            padding-left: 0.8rem;
            display: inline-block;
        }
        .timer-container {
            background: #0b0e16;
            border-radius: 2rem;
            padding: 1.8rem 1rem;
            margin: 1.8rem 0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 8px 20px rgba(0,0,0,0.2);
        }
        #countdown {
            font-size: 3rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            color: #ffe6a7;
            text-shadow: 0 0 8px #ffb34740;
            letter-spacing: 4px;
            word-break: break-word;
        }
        .timer-label {
            color: #6d7a9e;
            margin-top: 0.8rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 500;
        }
        .event-info {
            background: #1e2235;
            border-radius: 1.8rem;
            padding: 0.8rem 1rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #cfdcff;
            border: 1px solid #2d314a;
        }
        .footer {
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: #4c5679;
        }
        @media (max-width: 520px) {
            .card { padding: 1.5rem; }
            #countdown { font-size: 2.2rem; letter-spacing: 2px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="badge">🏫 國立新竹高級中學</div>
    <h1>⚡ 炎上冷卻計時器 ⚡</h1>
    <div class="sub">上次公眾爭議事件發生至今</div>
    <div class="timer-container">
        <div id="countdown">-- 天 -- 時 -- 分 -- 秒</div>
        <div class="timer-label">🔥 校園和平維持時間 🔥</div>
    </div>
    <div class="event-info" id="event-area">
        📢 載入最新事件中...
    </div>
    <div class="footer">
        🔍 資料來源：Dcard 討論版（關鍵詞＋熱度自動偵測）<br>
        ⏱️ 每10分鐘更新一次 | 炎上歸零計時
    </div>
</div>

<script>
    let lastBurnTimestamp = null;
    let latestEventName = "尚未有任何炎上紀錄";

    // 更新畫面顯示倒數
    function updateTimerDisplay() {
        if (!lastBurnTimestamp) {
            document.getElementById("countdown").innerHTML = `等待資料載入...`;
            return;
        }
        const now = new Date().getTime();
        const diff = now - lastBurnTimestamp;
        if (diff < 0) {
            document.getElementById("countdown").innerHTML = `時間錯誤，請重整`;
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (86400000)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (3600000)) / (1000 * 60));
        const seconds = Math.floor((diff % (60000)) / 1000);

        document.getElementById("countdown").innerHTML = 
            `${days}天 ${String(hours).padStart(2, '0')}時 ${String(minutes).padStart(2, '0')}分 ${String(seconds).padStart(2, '0')}秒`;
    }

    // 從 data.json 讀取最後炎上時間
    function fetchBurnData() {
        fetch('data.json?' + new Date().getTime())  // 加時間戳避免快取
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                if (data && data.last_burn) {
                    const burnTime = new Date(data.last_burn);
                    if (!isNaN(burnTime.getTime())) {
                        lastBurnTimestamp = burnTime.getTime();
                        latestEventName = data.latest_event || "未知事件";
                    } else {
                        throw new Error("時間格式無效");
                    }
                } else {
                    // 若無資料則顯示預設（例如建站時間）
                    lastBurnTimestamp = new Date("2026-01-01T00:00:00+08:00").getTime();
                    latestEventName = "預設起始點";
                }
                // 更新事件顯示區域
                const eventDiv = document.getElementById("event-area");
                eventDiv.innerHTML = `📰 近期炎上事件：${latestEventName}<br>⏲️ 最後歸零時間：${new Date(lastBurnTimestamp).toLocaleString('zh-TW')}`;
                updateTimerDisplay();
            })
            .catch(err => {
                console.error("讀取 data.json 失敗", err);
                document.getElementById("event-area").innerHTML = "⚠️ 無法連線至資料來源，請稍後重整頁面";
                document.getElementById("countdown").innerHTML = "資料讀取錯誤";
            });
    }

    // 每1秒更新畫面
    setInterval(() => {
        if (lastBurnTimestamp) updateTimerDisplay();
    }, 1000);

    // 初次載入 + 每30秒重新抓取 JSON（確保自動更新）
    fetchBurnData();
    setInterval(fetchBurnData, 30000);
</script>
</body>
</html>
